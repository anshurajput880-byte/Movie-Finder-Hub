[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = [
  "npm install -g pnpm",
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "BASE_PATH=/ PORT=3000 pnpm --filter @workspace/cinemate run build",
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "node --enable-source-maps artifacts/api-server/dist/index.mjs"
